# This file was created automatically with `myst init --gh-pages` 🪄 💚
# Optimized: Node 24, cancel-in-progress concurrency, no npm cache (no lockfile)
name: MyST GitHub Pages Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options: [info, warning, debug]
      tags:
        description: 'Test scenario tags'
        required: false
        type: boolean
      environment:
        description: 'Environment to run tests against'
        type: environment
        required: true

env:
  BASE_URL: /${{ github.event.repository.name }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}      # 按分支隔离，避免多分支互相锁
  cancel-in-progress: true            # 新 push 顶掉旧 run → 防 artifact 翻倍

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5       # v3→v5，适配 Node 24 runner

      - uses: actions/setup-node@v4
        with:
          node-version: 24                    # 18→24，消 Node 20 deprecation + punycode 警告
          # 不写 cache：仓库无 package-lock.json，cache: npm 会直接 Error

      - name: Install MyST
        run: npm install -g mystmd

      - name: Build HTML Assets
        run: |
          echo "Using BASE_URL=$BASE_URL"
          BASE_URL=$BASE_URL myst build --html --execute

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4 # v3→v4，与 deploy-pages@v4 同代
        with:
          path: './_build/html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4